# Saatlik FULL sync. Eski "delta" mantigi (yalniz max_id ustu kayitlar) yerini
# tam pull'a birakti cunku:
#   - per-page=1000 + 1 rps = ~10 dk: 60 dk pencerede rahat
#   - Silinen kayitlari otomatik reconcile eder (delta yapamiyordu)
#   - sgb_db smart upsert sayesinde icerik degismemis kayitlar last_changed_utc
#     bumplamaz -> STIX/TAXII cikti'si byte-identical kalir -> git diff sifir.
# Dosya adi geri uyumluluk icin sync-delta.yml kalsin (badge linkleri).
name: Sync (hourly full)

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      # sgb.db artik git'te degil (>100MB GitHub limiti). Onceki state'i
      # rolling release 'feeds-latest' asset'inden indir. Yoksa (ilk run /
      # release silinmis) sync sifirdan kurar.
      - name: Restore sgb.db from rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p state
          if gh release download feeds-latest -p sgb.db -D state/ 2>/dev/null; then
            echo "sgb.db restored: $(ls -lh state/sgb.db)"
          else
            echo "feeds-latest icinde sgb.db yok - sifirdan kurulacak"
          fi

      - name: Full sync (txt feed + SQLite dual-write)
        run: python scripts/sync.py --mode full

      - name: Health check
        run: python scripts/sync.py --mode healthcheck

      - name: Build TAXII 2.1 tree (docs/taxii/)
        if: hashFiles('state/sgb.db') != ''
        run: python scripts/build_taxii.py --compact

      - name: Commit txt feed + state (seen_ids.json) + TAXII
        # NOT: state/sgb.db .gitignore'da - rolling release asset'i olarak
        # dagitiliyor (asagidaki 'Prepare rolling release assets' adimi).
        run: |
          git config user.name "sgb-api-bridge-bot"
          git config user.email "noreply@github.com"
          git add docs/ state/seen_ids.json
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "Sync $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      # --- Rolling 'feeds-latest' release: sgb.db'yi asset olarak yayinla.
      # Bir sonraki sync run'i 'Restore sgb.db from rolling release' adiminda
      # bu asset'i indirip incremental devam eder. SIEM pack (feeds/, qradar/,
      # splunk/) commit 00ea15a'da silindi - sadece sgb.db tasiniyor.
      - name: Publish sgb.db to rolling release 'feeds-latest'
        if: success() && hashFiles('state/sgb.db') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%MZ)
          HEAD_SHA=$(git rev-parse HEAD)
          # Release yoksa olustur (prerelease, latest semantigini caldirmaz)
          if ! gh release view feeds-latest >/dev/null 2>&1; then
            gh release create feeds-latest \
              --title "SGB sync state — rolling (saatlik)" \
              --prerelease \
              --notes "sgb.db SQLite state - her saat tazelenir. Workflow tarafindan yonetilir."
          fi
          # Asset'i replace et (clobber)
          gh release upload feeds-latest state/sgb.db --clobber
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NOTES=$(printf 'Built (UTC): `%s`\nCommit: `%s`\nWorkflow run: %s\n\nsgb.db: SQLite state, bir sonraki sync run tarafindan incremental restore icin kullanilir.' "$BUILT_AT" "$HEAD_SHA" "$RUN_URL")
          gh release edit feeds-latest --notes "$NOTES"
